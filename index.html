<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#f7f5f2">
    <title>График БАД</title>
    <style>
        :root {
            --bg: #f7f5f2;
            --card: #ffffff;
            --text: #1e1e1e;
            --text-secondary: #5c5c5c;
            --text-tertiary: #8a8a8a;
            --accent: #4a8c6f;
            --accent-light: #e8f4ed;
            --accent-dark: #356b52;
            --morning: #e8913a;
            --morning-bg: #fef7f1;
            --day: #c8882a;
            --day-bg: #fefaf4;
            --evening: #5b6e8a;
            --evening-bg: #f4f6f9;
            --border: #e8e5e0;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
            --radius-sm: 10px;
            --radius: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --font-xs: 0.72rem;
            --font-sm: 0.82rem;
            --font-base: 0.94rem;
            --font-md: 1.05rem;
            --font-lg: 1.25rem;
            --font-xl: 1.5rem;
            --font-xxl: 1.9rem;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --nav-height: 68px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            line-height: 1.5;
            user-select: none;
            -webkit-user-select: none;
            padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 8px);
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            position: relative;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--bg);
            padding: 14px 16px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .header-date {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: -0.01em;
        }
        .header-title {
            font-size: var(--font-xl);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .month-nav {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--card);
            border-radius: 30px;
            padding: 6px 6px 6px 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .month-nav .month-name {
            font-weight: 600;
            font-size: var(--font-base);
            color: var(--text);
            min-width: 90px;
            text-align: center;
            letter-spacing: -0.01em;
        }
        .month-nav button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            color: var(--text);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .month-nav button:active {
            background: var(--accent-light);
            color: var(--accent);
            transform: scale(0.94);
        }
        .month-nav .btn-today {
            width: auto;
            border-radius: 20px;
            padding: 0 14px;
            font-size: var(--font-xs);
            font-weight: 600;
            letter-spacing: 0.02em;
            background: var(--accent);
            color: #fff;
            white-space: nowrap;
        }
        .month-nav .btn-today:active {
            background: var(--accent-dark);
            color: #fff;
            transform: scale(0.95);
        }

        /* Main content */
        .main-content {
            padding: 0 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* Section title */
        .section-title {
            font-size: var(--font-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-tertiary);
            padding: 12px 6px 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .dot-morning {
            background: var(--morning);
        }
        .dot-day {
            background: var(--day);
        }
        .dot-evening {
            background: var(--evening);
        }

        /* Supplement card */
        .supplement-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            animation: fadeInUp 0.35s ease forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .supplement-card:active {
            transform: scale(0.985);
            box-shadow: var(--shadow-md);
            border-color: var(--border);
        }
        .supplement-card.checked {
            border-color: #c8e6d4;
            background: #fafff9;
        }
        .supplement-card.checked .check-circle {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }
        .check-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #d5d2cc;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            transition: all 0.25s;
            color: transparent;
            background: #fff;
        }
        .card-info {
            flex: 1;
            min-width: 0;
        }
        .card-name {
            font-weight: 650;
            font-size: var(--font-base);
            letter-spacing: -0.01em;
            color: var(--text);
            margin-bottom: 2px;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .card-tag {
            font-size: var(--font-xs);
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }
        .tag-morning {
            background: var(--morning-bg);
            color: var(--morning);
        }
        .tag-day {
            background: var(--day-bg);
            color: var(--day);
        }
        .tag-evening {
            background: var(--evening-bg);
            color: var(--evening);
        }
        .card-dosage {
            font-size: var(--font-xs);
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }
        .card-chevron {
            color: #c5c2bb;
            font-size: 1.2rem;
            flex-shrink: 0;
            transition: transform 0.3s;
        }
        .supplement-card.expanded .card-chevron {
            transform: rotate(180deg);
            color: var(--accent);
        }
        .card-details {
            display: none;
            padding: 6px 0 0 0;
            border-top: 1px solid var(--border);
            margin-top: 8px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .supplement-card.expanded .card-details {
            display: block;
        }
        .supplement-card.expanded {
            flex-wrap: wrap;
            padding-bottom: 10px;
        }
        .supplement-card.expanded .card-info {
            flex: 1 1 60%;
        }
        .supplement-card.expanded .card-details {
            flex: 1 1 100%;
        }
        .detail-row {
            margin-bottom: 6px;
            font-size: var(--font-sm);
            line-height: 1.45;
        }
        .detail-label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: var(--font-xs);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-bottom: 1px;
        }
        .detail-value {
            color: var(--text);
            font-size: var(--font-sm);
        }
        .detail-warning {
            background: #fff8f5;
            border-radius: 8px;
            padding: 8px 10px;
            color: #b85a30;
            font-size: var(--font-xs);
            margin-top: 4px;
            line-height: 1.4;
        }
        .detail-tip {
            background: #f5faf7;
            border-radius: 8px;
            padding: 8px 10px;
            color: #3d6b52;
            font-size: var(--font-xs);
            margin-top: 4px;
            line-height: 1.4;
        }

        /* Daily progress */
        .daily-progress {
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 14px 18px;
            margin: 0 14px 6px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1.5px solid var(--border);
        }
        .progress-ring {
            position: relative;
            width: 52px;
            height: 52px;
            flex-shrink: 0;
        }
        .progress-ring svg {
            transform: rotate(-90deg);
            width: 52px;
            height: 52px;
        }
        .progress-ring .bg-circle {
            fill: none;
            stroke: #e8e5e0;
            stroke-width: 5;
        }
        .progress-ring .fg-circle {
            fill: none;
            stroke: var(--accent);
            stroke-width: 5;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }
        .progress-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: var(--font-sm);
            color: var(--text);
        }
        .progress-info .progress-title {
            font-weight: 600;
            font-size: var(--font-base);
        }
        .progress-info .progress-sub {
            font-size: var(--font-xs);
            color: var(--text-tertiary);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-tertiary);
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .empty-state p {
            font-size: var(--font-sm);
        }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: #fafaf8;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 6px 8px var(--safe-bottom);
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            height: var(--nav-height);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: var(--font-xs);
            font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 0.01em;
            background: transparent;
            border: none;
            min-width: 60px;
        }
        .nav-item.active {
            color: var(--accent);
            font-weight: 700;
            background: var(--accent-light);
        }
        .nav-item .nav-icon {
            font-size: 1.3rem;
            transition: transform 0.2s;
        }
        .nav-item:active .nav-icon {
            transform: scale(0.85);
        }

        /* Year grid */
        .year-grid-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 4px;
            padding-bottom: 8px;
            scroll-snap-type: x proximity;
        }
        .year-grid {
            display: grid;
            grid-template-columns: 130px repeat(12, 44px);
            gap: 1px;
            font-size: var(--font-xs);
            min-width: fit-content;
            background: var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .year-grid .yg-cell {
            background: var(--card);
            padding: 7px 4px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            font-weight: 500;
        }
        .year-grid .yg-header {
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 0.03em;
            color: var(--text-secondary);
            background: #fafaf7;
            position: sticky;
            top: 0;
        }
        .year-grid .yg-name {
            justify-content: flex-start;
            padding-left: 10px;
            font-weight: 600;
            font-size: var(--font-xs);
            letter-spacing: -0.01em;
            position: sticky;
            left: 0;
            z-index: 2;
            background: #fdfdfb;
        }
        .yg-active {
            color: var(--accent);
            font-weight: 700;
            font-size: 1rem;
        }
        .yg-inactive {
            color: #d5d2cc;
            font-size: 0.6rem;
        }
        .yg-highlight-col {
            background: #fafff8 !important;
        }

        /* Modal overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }
        .modal-sheet {
            background: #fff;
            width: 100%;
            max-width: 480px;
            border-radius: 20px 20px 0 0;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px 16px 30px;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow-lg);
        }
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #d5d2cc;
            border-radius: 2px;
            margin: 0 auto 14px;
        }
        .modal-title {
            font-size: var(--font-lg);
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f0ede8;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: #fff;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: var(--font-sm);
            font-weight: 600;
            z-index: 300;
            animation: toastIn 0.35s ease;
            pointer-events: none;
            letter-spacing: 0.01em;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Reset daily button */
        .reset-btn {
            background: none;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: var(--font-xs);
            cursor: pointer;
            color: var(--text-tertiary);
            font-weight: 500;
            transition: all 0.2s;
        }
        .reset-btn:active {
            background: #f5f0eb;
            color: var(--text);
        }

        @media (max-width: 380px) {
            .card-dosage {
                max-width: 100px;
            }
            .month-nav .month-name {
                min-width: 70px;
                font-size: var(--font-sm);
            }
            .year-grid {
                grid-template-columns: 110px repeat(12, 38px);
            }
        }
    </style>
</head>

        <!-- Bottom navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="today">
                <span class="nav-icon">☀️</span> Сегодня
            </button>
            <button class="nav-item" data-tab="month">

                dosage: '50–100 мкг.',
                combinations: 'Работает в синергии с цинком и витамином Е.',

                id: 'zinc',
                name: 'Цинк',
                fullName: 'Цинк (цитрат / пиколинат)',
                months: [11, 0, 1, 8, 9, 10],
                timeOfDay: ['day'],
                timeLabel: 'День',
                form: 'Цитрат, пиколинат (лучше усваиваются).',
                rules: '',
                dosage: '15–30 мг.',
                combinations: '',
                contraindications: 'Не совмещать в одном приёме с медью, железом или кальцием.',

            // ────────────────────────────────────
            // CONSTANTS & HELPERS
            // ────────────────────────────────────
            const MONTH_NAMES = [
                'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
                'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
            ];
            const MONTH_SHORT = [
                'Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн',
                'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'
            ];
            const TIME_LABELS = { morning: 'Утро', day: 'День', evening: 'Вечер' };
            const TIME_ORDER = ['morning', 'day', 'evening'];

            const now = new Date();
            let currentMonth = now.getMonth(); // 0-indexed (0=Jan)
            let currentYear = now.getFullYear();
            let activeTab = 'today';
            let expandedCardId = null;

            // ────────────────────────────────────
            // STORAGE
            // ────────────────────────────────────
            function getStorageKey() {
                const d = new Date();
                return 'baa-tracker-' + d.getFullYear() + '-' +
                    String(d.getMonth() + 1).padStart(2, '0') + '-' +
                    String(d.getDate()).padStart(2, '0');
            }

            function getCheckedSupplements() {
                const key = getStorageKey();
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : {};
                } catch (e) {
                    return {};
                }
            }

            function saveCheckedSupplements(obj) {
                const key = getStorageKey();
                try {
                    localStorage.setItem(key, JSON.stringify(obj));
                } catch (e) {}
            }

            function resetTodayChecks() {
                const key = getStorageKey();
                try { localStorage.removeItem(key); } catch (e) {}
            }

            // ────────────────────────────────────
            // GET SUPPLEMENTS FOR A GIVEN MONTH
            // ────────────────────────────────────
            function getSupplementsForMonth(monthIndex) {
                return supplements.filter(s => s.months.includes(monthIndex));
            }

            function getTodaySupplements() {
                const monthSupps = getSupplementsForMonth(currentMonth);
                return monthSupps;
            }

            // ────────────────────────────────────
            // RENDER FUNCTIONS
            // ────────────────────────────────────
            function renderHeader() {
                document.getElementById('monthName').textContent = MONTH_NAMES[currentMonth] + ' ' + currentYear;
                const d = new Date();
                const dayNames = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];
                document.getElementById('headerDate').textContent =
                    dayNames[d.getDay()] + ', ' + d.getDate() + ' ' +
                    MONTH_NAMES[d.getMonth()].toLowerCase().slice(0, 3) + ' ' + d.getFullYear();
            }

            function renderDailyProgress() {
                const todaySupps = getTodaySupplements();
                const checked = getCheckedSupplements();
                const total = todaySupps.length;
                const done = todaySupps.filter(s => checked[s.id]).length;
                const pct = total > 0 ? Math.round((done / total) * 100) : 0;

                document.getElementById('progressText').textContent = done + '/' + total;
                document.getElementById('progressTitle').textContent =
                    total === 0 ? 'Нет приёма на сегодня' : 'Приём на сегодня';
                document.getElementById('progressSub').textContent =
                    total === 0 ? 'Наслаждайтесь днём!' :
                    done === total ? '✅ Всё принято!' :
                    'Осталось: ' + (total - done);

                const circle = document.getElementById('progressCircle');
                const circumference = 138.23;
                const offset = circumference - (pct / 100) * circumference;
                circle.style.strokeDashoffset = offset;
                if (done === total && total > 0) {
                    circle.style.stroke = '#4a8c6f';
                } else if (done > 0) {
                    circle.style.stroke = '#7db894';
                } else {
                    circle.style.stroke = '#4a8c6f';
                }
            }

            function createSupplementCard(supp, isTodayView = false) {
                const checked = getCheckedSupplements();
                const isChecked = !!checked[supp.id];
                const isExpanded = expandedCardId === supp.id;

                const card = document.createElement('div');
                card.className = 'supplement-card' + (isChecked ? ' checked' : '') + (isExpanded ?
                    ' expanded' : '');
                card.setAttribute('data-supplement-id', supp.id);
                card.style.animationDelay = (Math.random() * 0.15) + 's';

                const timeTags = supp.timeOfDay.map(t =>
                    `<span class="card-tag tag-${t === 'morning' ? 'morning' : t === 'day' ? 'day' : 'evening'}">${TIME_LABELS[t]}</span>`
                ).join('');

                card.innerHTML = `
                <div class="check-circle">✓</div>
                <div class="card-info">
                  <div class="card-name">${supp.name}</div>
                  <div class="card-meta">
                    ${timeTags}
                    <span class="card-dosage">${supp.dosage}</span>
                  </div>
                </div>
                <span class="card-chevron">▾</span>
                <div class="card-details">
                  <div class="detail-row">
                    <div class="detail-label">Форма</div>
                    <div class="detail-value">${supp.form}</div>
                  </div>
                  <div class="detail-row">
                    <div class="detail-label">Время приёма</div>
                    <div class="detail-value">${supp.timeLabel}</div>
                  </div>
                  ${supp.rules ? `<div class="detail-row">
                    <div class="detail-label">Правила</div>
                    <div class="detail-value">${supp.rules}</div>
                  </div>` : ''}
                  <div class="detail-row">
                    <div class="detail-label">Дозировка</div>
                    <div class="detail-value">${supp.dosage}</div>
                  </div>
                  ${supp.combinations ? `<div class="detail-row">
                    <div class="detail-label">Совместное применение</div>
                    <div class="detail-value">${supp.combinations}</div>
                  </div>` : ''}
                  ${supp.contraindications ? `<div class="detail-warning">⚠️ ${supp.contraindications}</div>` : ''}
                  ${supp.notes ? `<div class="detail-tip">💡 ${supp.notes}</div>` : ''}
                </div>
              `;

                // Click on check circle
                const checkCircle = card.querySelector('.check-circle');
                checkCircle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleSupplementCheck(supp.id);
                });

                // Click on card body to expand/collapse
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.check-circle')) return;
                    if (expandedCardId === supp.id) {
                        expandedCardId = null;
                    } else {
                        expandedCardId = supp.id;
                    }
                    refreshView();
                });

                return card;
            }

            function toggleSupplementCheck(suppId) {
                const checked = getCheckedSupplements();
                if (checked[suppId]) {
                    delete checked[suppId];
                } else {
                    checked[suppId] = true;
                }
                saveCheckedSupplements(checked);
                refreshView();
                const supp = supplements.find(s => s.id === suppId);
                if (supp && checked[suppId]) {
                    showToast('✅ ' + supp.name + ' — принято!');
                }
            }

            function showToast(message) {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1800);
            }

            function renderTodayView() {
                const todaySupps = getTodaySupplements();
                const container = document.getElementById('mainContent');
                container.innerHTML = '';

                if (todaySupps.length === 0) {
                    container.innerHTML = `
                  <div class="empty-state">
                    <div class="icon">🌿</div>
                    <p>В этом месяце приём БАД не запланирован.</p>
                    <p style="font-size:0.75rem;color:#aaa;">Переключитесь на вкладку «Месяц» для просмотра.</p>
                  </div>`;
                    return;
                }

                // Group by time of day
                const groups = { morning: [], day: [], evening: [] };
                todaySupps.forEach(s => {
                    s.timeOfDay.forEach(t => {
                        if (groups[t]) groups[t].push(s);
                    });
                });

                TIME_ORDER.forEach(timeKey => {
                    const sups = groups[timeKey];
                    if (sups.length === 0) return;
                    const dotClass = timeKey === 'morning' ? 'dot-morning' : timeKey === 'day' ?
                        'dot-day' : 'dot-evening';
                    const sectionTitle = document.createElement('div');
                    sectionTitle.className = 'section-title';
                    sectionTitle.innerHTML =
                        `<span class="dot ${dotClass}"></span>${TIME_LABELS[timeKey]} (${sups.length})`;
                    container.appendChild(sectionTitle);

                    // Deduplicate (a supplement may appear in multiple time groups)
                    const seen = new Set();
                    sups.forEach(s => {
                        if (!seen.has(s.id)) {
                            seen.add(s.id);
                            container.appendChild(createSupplementCard(s, true));
                        }
                    });
                });
            }

            function renderMonthView() {
                const monthSupps = getSupplementsForMonth(currentMonth);
                const container = document.getElementById('mainContent');
                container.innerHTML = '';

                if (monthSupps.length === 0) {
                    container.innerHTML = `
                  <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>В ${MONTH_NAMES[currentMonth].toLowerCase()} приём БАД не запланирован.</p>
                  </div>`;
                    return;
                }

                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'section-title';
                sectionTitle.textContent = 'Все БАДы на ' + MONTH_NAMES[currentMonth].toLowerCase() +
                    ' (' + monthSupps.length + ')';
                container.appendChild(sectionTitle);

                monthSupps.forEach(s => {
                    container.appendChild(createSupplementCard(s, false));
                });
            }

            function renderYearView() {
                const container = document.getElementById('mainContent');
                container.innerHTML = '';

                const sectionTitle = document.createElement('div');
                sectionTitle.className = 'section-title';
                sectionTitle.textContent = 'Годовой обзор';
                container.appendChild(sectionTitle);

                const gridWrapper = document.createElement('div');
                gridWrapper.className = 'year-grid-container';
                gridWrapper.innerHTML = `
              <div class="year-grid">
                <div class="yg-cell yg-header yg-name">БАД</div>
                ${MONTH_SHORT.map((m, i) => {
                  const isCurrent = i === currentMonth;
                  return `<div class="yg-cell yg-header${isCurrent ? ' yg-highlight-col' : ''}">${m}</div>`;
                }).join('')}
                ${supplements.map(s => `
                  <div class="yg-cell yg-name">${s.name}</div>
                  ${Array.from({length:12}, (_, i) => {
                    const active = s.months.includes(i);
                    const isCurrentMonth = i === currentMonth;
                    return `<div class="yg-cell${isCurrentMonth ? ' yg-highlight-col' : ''}">
                      ${active ? '<span class="yg-active">●</span>' : '<span class="yg-inactive">·</span>'}
                    </div>`;
                  }).join('')}
                `).join('')}
              </div>`;
                container.appendChild(gridWrapper);

                const legend = document.createElement('div');
                legend.style.cssText =
                    'display:flex;gap:16px;padding:10px 6px;font-size:0.75rem;color:#8a8a8a;flex-wrap:wrap;';
                legend.innerHTML =
                    '<span>● — приём в этом месяце</span><span>· — перерыв</span><span style="background:#fafff8;padding:2px 8px;border-radius:10px;">▨ — текущий месяц</span>';
                container.appendChild(legend);
            }

            function refreshView() {
                renderHeader();
                renderDailyProgress();
                expandedCardId = null; // reset expansions on view switch
                if (activeTab === 'today') renderTodayView();
                else if (activeTab === 'month') renderMonthView();
                else if (activeTab === 'year') renderYearView();
                updateNavButtons();
            }

            function updateNavButtons() {
                document.querySelectorAll('.nav-item').forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('data-tab') === activeTab);
                });
            }

            // ────────────────────────────────────
            // EVENT HANDLERS
            // ────────────────────────────────────
            document.getElementById('btnPrev').addEventListener('click', () => {
                currentMonth--;
                if (currentMonth < 0) { currentMonth = 11;
                    currentYear--; }
                if (activeTab === 'today') activeTab = 'month';
                refreshView();
            });

            document.getElementById('btnNext').addEventListener('click', () => {
                currentMonth++;
                if (currentMonth > 11) { currentMonth = 0;
                    currentYear++; }
                if (activeTab === 'today') activeTab = 'month';
                refreshView();
            });

            document.getElementById('btnToday').addEventListener('click', () => {
                const today = new Date();
                currentMonth = today.getMonth();
                currentYear = today.getFullYear();
                activeTab = 'today';
                refreshView();
            });

            document.getElementById('btnReset').addEventListener('click', () => {
                resetTodayChecks();
                refreshView();
                showToast('🔄 Отметки сброшены');
            });

            // Bottom nav
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    activeTab = btn.getAttribute('data-tab');
                    if (activeTab === 'today') {
                        const today = new Date();
                        currentMonth = today.getMonth();
                        currentYear = today.getFullYear();
                    }
                    refreshView();
                });
            });

            // Modal overlay click to close
            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) {
                    this.style.display = 'none';
                }
            });

            // Swipe support for month navigation
            let touchStartX = 0;
            let touchStartY = 0;
            document.getElementById('mainContent').addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: true });

            document.getElementById('mainContent').addEventListener('touchend', function(e) {
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
                    if (dx < -40) {
                        // swipe left = next month
                        currentMonth++;
                        if (currentMonth > 11) { currentMonth = 0;
                            currentYear++; }
                        if (activeTab === 'today') activeTab = 'month';
                        refreshView();
                    } else if (dx > 40) {
                        // swipe right = prev month
                        currentMonth--;
                        if (currentMonth < 0) { currentMonth = 11;
                            currentYear--; }
                        if (activeTab === 'today') activeTab = 'month';
                        refreshView();
                    }
                }
            });

            // ────────────────────────────────────
            // INIT
            // ────────────────────────────────────
            function init() {
                renderHeader();
                renderDailyProgress();
                renderTodayView();
                updateNavButtons();
            }

            init();

            // Refresh every minute to handle day change
            setInterval(() => {
                const newKey = getStorageKey();
                const oldKey = localStorage.getItem('_last_key') || '';
                if (newKey !== oldKey) {
                    localStorage.setItem('_last_key', newKey);
                    refreshView();
                }
                renderDailyProgress();
            }, 30000);

            console.log('🌿 График БАД — приложение готово.');
            console.log('   ' + supplements.length + ' добавок загружено.');
            console.log('   Текущий месяц: ' + MONTH_NAMES[currentMonth] + ' ' + currentYear);
            console.log('   Активно для приёма сегодня: ' + getTodaySupplements().length + ' наименований.');
        })();
    </script>
